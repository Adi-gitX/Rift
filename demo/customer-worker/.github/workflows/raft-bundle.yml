# Provided by Raft. Drop this file into the customer's repo at
# `.github/workflows/raft-bundle.yml`. On every push that matches a PR,
# the action builds the worker bundle and POSTs it to the Raft control
# plane, where it's stored under the per-repo upload token.
name: raft-bundle

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx wrangler deploy --dry-run --outdir=dist
      - name: Zip bundle
        run: |
          cd dist
          zip -r ../bundle.zip .
      - name: Upload to Raft
        env:
          RAFT_UPLOAD_URL: ${{ secrets.RAFT_UPLOAD_URL }}      # https://your-control.workers.dev
          RAFT_UPLOAD_TOKEN: ${{ secrets.RAFT_UPLOAD_TOKEN }}  # raft_ut_…
          RAFT_REPO_ID: ${{ secrets.RAFT_REPO_ID }}            # shown in the Raft dashboard
        run: |
          curl -sS -X POST "$RAFT_UPLOAD_URL/api/v1/bundles/upload" \
            -H "Authorization: Bearer $RAFT_UPLOAD_TOKEN" \
            -H "X-Raft-Repo-Id: $RAFT_REPO_ID" \
            -H "X-Raft-Head-Sha: ${{ github.event.pull_request.head.sha }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @bundle.zip \
            --fail-with-body
